name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Minecraft modding (Forge/NeoForge/Fabric) can be highly intensive.
    # Caching is automatically handled by the setup-gradle action below.
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Gives the wrapper execution permissions just in case git lost them
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Mod with Gradle
      run: ./gradlew build

    # FIXED: Corrected path to 'build/libs/' and provided a clean name
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: minecraft-mod-build
        path: build/libs/*.jar
        if-no-files-found: error

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Helps Dependabot track vulnerabilities in your libraries (like Loom, Architectury, etc.)
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v4